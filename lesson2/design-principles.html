<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE-edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>W02 Design Priciples Documents</title>
        <meta name="author" content="Dustin Trinh"
        <meta name="description" content="W02 Design principles Documents Presentation 
        about Rule of Thirds, Hick's Law, and White Space">
        <link href="styles/small-design.css" rel="stylesheet">
        <link href="styles/medium-design.css" rel="stylesheet">
        <link href="styles/large-design.css" rel="stylesheet">
        <link href="styles/normalize.css" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300&family=Poppins:wght@300&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <h1>Design Principles Documents</h1>
        </header>
        <main>
            <div class="main-grid">
                <figure class="grid-1">
                    <h3>Rule of Thirds</h3>
                    <p>Bleacher Report</p>
                    <a href="https://bleacherreport.com/">bleacherreport.com</a>
                    <div class="images">
                        <img src="images/bleacher-report.png" alt="Bleacherreport Mobile Screenshot">
                    </div>
                    <p>
                        Bleacher Report displays good Rule of Thirds to me because of the 3 areas
                        that get the most attention are NFL, Top News, and Get App. Not only did they position
                        them well in the most attention getter positions, they highlighted them bright green.
                    </p>
                </figure>
                <figure class="grid-2">
                    <h3>Hick's Law</h3>
                    <p>Hulu</p>
                    <a href="https://www.hulu.com/welcome?orig_referrer=https%3A%2F%2Fwww.google.com%2F">Hulu.com</a>
                    <div class="images">
                        <img src="images/hulu.png" alt="Hulu Mobile screenshot">
                    </div>
                    <p>
                        Hulu does a pretty good job with Hick's Law. The home page of Hulu explains things simply, and 
                        utilizes big logos of the well known brands. In each little section shows exactly what you'll
                        be getting in your desired package! 
                    </p>
                </figure>
                <figure class="grid-3">
                    <h3>Rule of Thirds</h3>
                    <p>Lululemon</p>
                    <a href="https://shop.lululemon.com/">Lululemon.com</a>
                    <div class="images">
                        <img src="images/lululemon.png" alt="Lululemon Mobile screenshot"
                    </div>
                    <p>
                        If you know Lululemon then you know they are boujee! I expected their website to be a little
                        crazy, but instead they go the opposite and utilize white space to make their clothing that is pictured
                        pop out. I would say the website is a very simple/solid website and making sure the users
                        have the easiest time viewing their clothes.
                    </p>
                </figure>
            </div>
        </main>
        <footer>
            <div class="footer-wrap">
                <div class="copyright">
                    <span id="copyright"> 2023</span>
                    | Dustin Trinh | last updated: 
                    <span id="lastupdated"></span>
                </div>
            </div>
        </footer>
        <script src="scripts/scripts.js"></script>
    </body>
</html>
